<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:30px;
        }

        .checkout{
            max-width:700px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#8B4513;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:6px;
            background:#8B4513;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#5f2f0b;
        }

    </style>

</head>

<body>

<div class="checkout">
    <h1>Checkout </h1>
<form id="orderForm"
      action="https://formspree.io/f/xjgnkapv"
      method="POST">

    <input type="text" name="name" id="name" placeholder="Full Name" required>

    <input type="tel" name="phone" id="phone" placeholder="Phone Number" required>

    <input type="email" name="email" id="email" placeholder="Email" required>

    <input type="text" name="address" id="address"
           placeholder="Delivery Address" required>

    <textarea name="note" id="note"
              placeholder="Additional Note"></textarea>

    <textarea name="order" id="orderDetails" hidden></textarea>

    <button type="submit" id="placeOrderBtn" onclick="placeOrder()">
        Place Order
    </button>

</form>

</div>

<script src="checkout.js"></script>

</body>
</html>
