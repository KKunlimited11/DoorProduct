<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f5f5f5;
}

.card{
    width:90%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.check{
    font-size:80px;
}

h1{
    margin:20px 0;
    color:#8B4513;
}

p{
    margin-bottom:25px;
    color:#555;
}

a{
    display:inline-block;
    text-decoration:none;
    background:#8B4513;
    color:white;
    padding:12px 25px;
    border-radius:8px;
}

a:hover{
    background:#5f2f0b;
}

</style>

</head>
<body>

<div class="card">

<div class="check">✅</div>

<h1>Thank You!</h1>

<p>
Your order has been received successfully.
We will contact you shortly to confirm your order.
</p>

<a href="index.html">
Back to Home
</a>

</div>

</body>
</html>
